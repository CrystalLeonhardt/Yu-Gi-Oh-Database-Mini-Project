<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${cartaNome}"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</head>
<body>
    <h1 th:text="${cartaNome}"></h1>
   <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>DESCRIÇÃO</th>
                <th>ATK</th>
                <th>DEF</th>
            </tr>
        </thead>
        <tbody>
            <tr>
            	<td th:text="${cartaID}"></td>
            	<td th:text="${descricao}"></td>
                <td th:text="${atk}"></td>
                <td th:text="${def}"></td>
            </tr>
        </tbody>
    </table>
    <div class="voltar">
        <a th:href="@{/}">Voltar</a>
        <a th:href="@{/carta}">Cadastro</a>
        <a th:href="@{/carta/listar}">Lista</a>
    </div>
</body>
</html>
