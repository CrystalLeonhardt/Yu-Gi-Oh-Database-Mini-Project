<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Arquetipos Cadastrados</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>NOME</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="arquetipo : ${arquetipos}">
            	<td th:text="${arquetipo.arquetipoID}"></td>
            	<td th:text="${arquetipo.arquetipoNome}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
