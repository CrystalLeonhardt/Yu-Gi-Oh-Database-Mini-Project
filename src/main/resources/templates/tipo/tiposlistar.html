<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tipos Cadastrados</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</head>
<body>
    <h1>Lista de Tipos</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>NOME</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="tipo : ${tipos}">
            	<td th:text="${tipo.tipoID}"></td>
            	<td th:text="${tipo.tipoNome}"></td>
            </tr>
        </tbody>
    </table>
    <div class="voltar">
        <a th:href="@{/}">Voltar</a>
        <a th:href="@{/tipo}">Cadastro</a>
    </div>
</body>
</html>
