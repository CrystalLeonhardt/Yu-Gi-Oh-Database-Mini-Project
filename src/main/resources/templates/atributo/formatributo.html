<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastro de Atributos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</head>
<body>
     <h1>Cadastrar Atributo</h1>
    <form action="#" th:action="@{/atributo}" method=post th:object="${atributo}">
    	<label for="atributoNome">Nome do Atributo:</label><br> 
        <input type="text" th:field="*{atributoNome}"><br>
    	<input type="submit" value="Cadastrar">
    </form>
    <div class="voltar">
        <a th:href="@{/}">Voltar</a>
        <a th:href="@{/atributo/listar}">Lista</a>
    </div>
</body>
</html>
